# Server Configuration
server.port=8080
spring.application.name=ERO-Backend

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ero_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=ERO2026SecretKeyForEmergencyResponseOptimizerSystem1234567890
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000

# WebSocket Configuration
websocket.allowed-origins=*

# Logging
logging.level.root=INFO
logging.level.com.ero=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
