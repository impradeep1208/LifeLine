# Production Configuration
server.port=${PORT:8080}
spring.application.name=ERO-Backend

# PostgreSQL Database Configuration (Render provides free PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ero_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:ERO2026SecretKeyForEmergencyResponseOptimizerSystem1234567890}
jwt.expiration=86400000

# CORS Configuration - Allow all origins for deployment
cors.allowed-origins=*

# WebSocket Configuration
websocket.allowed-origins=*

# Logging
logging.level.root=INFO
logging.level.com.ero=INFO
