<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERO - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <!-- Login Container -->
    <div class="login-container">
        <!-- Background Animation -->
        <div class="login-bg">
            <div class="animated-circle circle-1"></div>
            <div class="animated-circle circle-2"></div>
            <div class="animated-circle circle-3"></div>
        </div>

        <!-- Login Box -->
        <div class="login-box">
            <!-- Logo & Title -->
            <div class="login-header">
                <div class="login-logo">🚨</div>
                <h1>Emergency Response Optimizer</h1>
                <p class="login-subtitle">Smart City Emergency Coordination System</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <!-- Username -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter username"
                        required
                    >
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter password"
                        required
                    >
                </div>

                <!-- Role Selection -->
                <div class="form-group">
                    <label for="role">Select Role</label>
                    <select id="role" name="role" required>
                        <option value="">-- Choose your role --</option>
                        <option value="citizen">👤 Citizen</option>
                        <option value="ambulance">🚑 Ambulance Operator</option>
                        <option value="traffic">👮 Traffic Police</option>
                        <option value="hospital">🏥 Hospital Admin</option>
                        <option value="control">🎛️ Control Room Admin</option>
                    </select>
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-btn">
                    <span>LOGIN</span>
                    <span class="login-arrow">→</span>
                </button>

                <!-- Emergency Access Button (No Login Required) -->
                <div class="emergency-access-divider">
                    <span>OR</span>
                </div>
                <a href="dashboard.html?citizen=true" class="emergency-access-btn">
                    <span class="emergency-icon">🆘</span>
                    <div class="emergency-text">
                        <strong>EMERGENCY - REPORT NOW</strong>
                        <small>No login required for citizens</small>
                    </div>
                    <span class="emergency-arrow">→</span>
                </a>

                <!-- Quick Login Hints -->
                <div class="login-hints">
                    <p class="hint-title">Demo Credentials:</p>
                    <div class="hints-grid">
                        <span class="hint-badge">Any username/password works</span>
                        <span class="hint-badge">Just select a role</span>
                    </div>
                </div>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>Smart City Hackathon Prototype © 2026</p>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notificationToast" class="notification-toast hidden"></div>

    <!-- Login Script -->
    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        
        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.getElementById('role').value;
            
            // Validation
            if (!username || !password || !role) {
                showNotification('Please fill all fields', true);
                return;
            }
            
            try {
                showNotification('Authenticating...', false);
                
                // Call backend login API
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Invalid credentials');
                }
                
                const data = await response.json();
                
                // Extract user info from response
                const user = data.user || data;
                const token = data.token;
                
                // Verify role matches - convert frontend role to backend format
                const roleMap = {
                    'citizen': 'CITIZEN',
                    'ambulance': 'AMBULANCE',
                    'traffic': 'TRAFFIC',
                    'hospital': 'HOSPITAL',
                    'control': 'CONTROL'
                };
                
                const userRole = user.role || data.role;
                if (userRole !== roleMap[role]) {
                    showNotification(`Invalid role! This account is registered as ${userRole}`, true);
                    return;
                }
                
                // Store user data in localStorage
                const userData = {
                    username: username,
                    role: role,
                    token: token,
                    userId: user.id || data.userId,
                    fullName: user.fullName || user.full_name,
                    loginTime: new Date().toISOString()
                };
                
                localStorage.setItem('eroUser', JSON.stringify(userData));
                
                // Show success notification
                showNotification('Login successful! Redirecting...', false);
                
                // Redirect to dashboard after short delay
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                console.error('Login failed:', error);
                showNotification('Login failed! Check your credentials and try again.', true);
            }
        });
        
        // Notification function
        function showNotification(message, isError = false) {
            const toast = document.getElementById('notificationToast');
            toast.textContent = message;
            toast.className = 'notification-toast';
            
            if (isError) {
                toast.classList.add('error');
            }
            
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }
        
        // Clear any existing session on page load
        window.addEventListener('load', () => {
            // Optional: clear previous session
            // localStorage.removeItem('eroUser');
        });
    </script>
</body>
</html>
