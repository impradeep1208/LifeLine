services:
  # Database
  - type: pserv
    name: lifeline-db
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.postgres
    disk:
      name: lifeline-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
    envVars:
      - key: POSTGRES_DB
        value: ero_db
      - key: POSTGRES_USER
        value: ero_user
      - key: POSTGRES_PASSWORD
        generateValue: true

  # Web Service
  - type: web
    name: lifeline-app
    env: java
    plan: free
    region: oregon
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -Dspring.profiles.active=prod -jar backend/target/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lifeline-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m"
